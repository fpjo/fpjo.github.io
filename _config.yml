locale                   : "zh-CN"
site_theme               : "default"
title                    : "曾子杉 | Zishan Zeng"
title_separator          : "|"
name                     : &name "曾子杉 | Zishan Zeng"
description              : &description "南方科技大学计算机科学与技术本科生, 关注机器人视觉, 边缘端部署与多模态智能."
url                      : "https://fpjo.github.io"
baseurl                  : ""
repository               : "fpjo/fpjo.github.io"

author:
  avatar           : "https://avatars.githubusercontent.com/u/29922559?v=4"
  name             : "曾子杉 / Zishan Zeng"
  bio              : "SUSTech CS undergraduate. Robotics vision, multimodal learning and efficient visual intelligence."
  location         : "Shenzhen, China"
  employer         : "Southern University of Science and Technology"
  email            : "12310733@mail.sustech.edu.cn"
  github           : "fpjo"

teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : false
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               :
atom_feed:
  hide                   : true

google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

twitter:
  username               :
facebook:
  username               :
  app_id                 :
og_image                 :
og_description           :
social:
  type                   : Person
  name                   : "Zishan Zeng"
  links:
    - "https://github.com/fpjo"

analytics:
  provider               : "false"

include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  teaching:
    output: false
  publications:
    output: false
  portfolio:
    output: false
  talks:
    output: false

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Asia/Shanghai

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

compress_html:
  clippings: all
  ignore:
    envs: development
